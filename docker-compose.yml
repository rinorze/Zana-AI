services:
  backend:
    build:
      context: ./backend
    container_name: zana-backend
    env_file: ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_data:/app/chroma_data
      - ./backend/uploads:/app/uploads
      - ./backend/zana.db:/app/zana.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: zana-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
